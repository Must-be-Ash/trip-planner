<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trip Itinerary</title>
<!--
  trip-planner itinerary — FIXED design system (see reference/DESIGN.md). Do NOT restyle.
  You only: (1) fill the TRIP object at the bottom, (2) set TRIP.nativeName (東京 / Roma / …).
  One accent (#C8442A) + tints only · off-white canvas · serif display + Inter + mono · line icons (no emoji)
  · no gradients except the header's single subtle radial · number-badge cards (no side bars).
  Rendered via safe DOM text nodes (no innerHTML). Leaflet + fonts load from CDN (online-OK).
-->
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --accent:#C8442A; --accent-600:#A8371F; --accent-100:#F6E3DD; --accent-050:#FBF1EE;
    --ink:#1A1815; --ink-70:#5B564E; --ink-40:#655F55;
    --bg:#F4F1EA; --surface:#FFFFFF; --border:#E7E1D6;
    --display:"Playfair Display","Georgia",serif; --body:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
    --r-card:14px; --r-ctl:9px; --pad:22px; --max:880px;
    --sh:0 1px 2px rgba(26,24,21,.04); --sh-float:0 10px 30px rgba(26,24,21,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.6;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 20px;}
  h1,h2,h3{font-family:var(--display);font-weight:700;line-height:1.1;margin:0;}
  a{color:var(--accent-600);text-decoration:none;}
  .pin-badge{background:var(--accent);color:#fff;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font:600 13px var(--mono);box-shadow:0 1px 3px rgba(0,0,0,.35);}
  .label{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-40);}
  .ic{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;vertical-align:middle;}
  .ic.star{fill:currentColor;stroke:none;width:14px;height:14px;}

  /* Header — the ONE allowed subtle radial (single ink hue + faint accent glow) */
  header.hero{position:relative;overflow:hidden;color:#F4EDE4;
    background:
      radial-gradient(70% 90% at 82% 6%, rgba(200,68,42,.20), transparent 60%),
      radial-gradient(120% 140% at 15% 0%, #2a2620, var(--ink) 58%);}
  header.hero .wrap{position:relative;z-index:1;padding:62px 20px 56px;}
  .native-wm{position:absolute;z-index:0;top:50%;right:4%;transform:translateY(-50%);font-family:var(--display);font-weight:800;
    font-size:clamp(84px,17vw,188px);line-height:1;color:rgba(244,237,228,.13);
    white-space:nowrap;pointer-events:none;user-select:none;}
  @media(max-width:640px){ .native-wm{font-size:clamp(64px,22vw,120px);right:3%;} header.hero .wrap{padding:44px 20px 40px;} }
  .title{font-family:var(--display);font-weight:800;font-size:clamp(30px,5vw,46px);line-height:1.04;letter-spacing:-.01em;color:#fff;max-width:74%;}
  .hmeta{font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;color:#C9BEB0;margin-top:14px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;
    color:#F4EDE4;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);padding:5px 10px;border-radius:9999px;}
  .chip .ic{width:14px;height:14px;stroke-width:2;}

  /* Framed hero map image */
  .heromap{margin:22px 0 6px;border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--sh-float);}
  .heromap img{display:block;width:100%;height:auto;}

  /* Day tabs */
  nav.tabs{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;scrollbar-width:thin;}
  nav.tabs .wrap{display:flex;gap:6px;padding:12px 20px;}
  nav.tabs button{font:600 13.5px var(--body);border:1px solid var(--border);background:var(--surface);color:var(--ink-70);
    padding:8px 15px;border-radius:9999px;cursor:pointer;flex:0 0 auto;transition:.15s;}
  nav.tabs button:hover{border-color:var(--ink-40);}
  nav.tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  nav.tabs button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  section.panel{display:none;padding:clamp(40px,7vw,64px) 0 8px;}
  section.panel.active{display:block;}
  section.panel > :first-child{margin-top:0;}
  .eyebrow{display:flex;align-items:center;gap:8px;color:var(--accent-600);margin:clamp(28px,5vw,44px) 0 10px;}
  .eyebrow .label{color:var(--accent-600);}
  h2.sec{font-size:clamp(24px,3.5vw,30px);margin-bottom:20px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--sh);}
  .grid{display:grid;gap:14px;}

  /* Flight verdict — icon + heading, NO side bar */
  .verdict{padding:var(--pad);margin-bottom:22px;}
  .verdict h3{font-size:19px;margin:2px 0 6px;}
  .verdict p{margin:0;color:var(--ink-70);font-size:15px;}

  /* A "strip" = ONE panel split into columns by hairlines (used for weather + facts, so they don't look like more cards) */
  .strip{display:flex;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--sh);overflow:hidden;margin-bottom:8px;}
  .strip > .col{flex:1 1 0;min-width:110px;padding:16px 18px;border-left:1px solid var(--border);}
  .strip > .col:first-child{border-left:0;}

  /* Weather strip */
  .wx .d{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-40);}
  .wx .ic{width:24px;height:24px;color:var(--accent);margin:8px 0 4px;stroke-width:1.6;}
  .wx .t{font-family:var(--display);font-size:25px;font-weight:600;}
  .wx .c{font-size:12.5px;color:var(--ink-70);}
  .wx .pop{display:inline-block;margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--accent-600);background:var(--accent-100);padding:2px 8px;border-radius:9999px;}

  /* Facts strip */
  .factcol .k{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-40);}
  .factcol .k .ic{width:15px;height:15px;color:var(--accent);}
  .factcol .v{font-size:15px;font-weight:500;margin-top:6px;}

  /* Before you go — a LIST with dividers (not cards) */
  .preplist{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--sh);overflow:hidden;margin-bottom:8px;}
  .preplist .item{display:flex;gap:14px;padding:16px 18px;border-top:1px solid var(--border);align-items:flex-start;}
  .preplist .item:first-child{border-top:0;}
  .preplist .item > .ic{color:var(--accent);margin-top:2px;}
  .preplist .pl{font-weight:600;font-size:15px;}
  .preplist .pd{font-size:13.5px;color:var(--ink-70);margin-top:3px;}
  .preplist .pa{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--accent-600);}
  .preplist .pa .ic{width:14px;height:14px;color:var(--accent-600);}
  .preplist .badge{display:inline-block;margin-left:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-600);background:var(--accent-100);padding:3px 8px;border-radius:9999px;vertical-align:middle;}

  /* Map */
  .map{height:320px;border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--sh);margin:6px 0 14px;}
  .leaflet-container{font-family:var(--body);}

  /* Spot cards — number badge, NO left color bar */
  .spot{display:flex;gap:14px;padding:16px 18px;margin:12px 0;align-items:flex-start;}
  .spot .num{flex:0 0 30px;height:30px;width:30px;border-radius:9999px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:13px;}
  .spot .body{flex:1;min-width:0;}
  .spot .when{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-40);}
  .spot h3{font-family:var(--display);font-size:17px;margin:3px 0 6px;}
  .spot .meta{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-70);margin-bottom:6px;}
  .spot .meta .star{color:var(--accent);}
  .spot .addr{display:flex;gap:6px;align-items:flex-start;color:var(--ink-40);font-size:12.5px;margin-bottom:10px;}
  .spot .addr .ic{width:15px;height:15px;margin-top:1px;color:var(--ink-40);}
  .spot p{margin:4px 0 14px;font-size:15px;color:var(--ink-70);}

  .btn{display:inline-flex;align-items:center;gap:7px;font:600 13px var(--body);padding:8px 14px;border-radius:var(--r-ctl);
    cursor:pointer;transition:.15s;text-decoration:none;}
  .btn.primary{background:var(--accent);color:#fff;border:1px solid var(--accent);}
  .btn.primary:hover{background:var(--accent-600);border-color:var(--accent-600);}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--border);}
  .btn.ghost:hover{border-color:var(--ink-40);}
  .btn .ic{width:16px;height:16px;}
  .maprow{margin-bottom:6px;}

  /* Phrasebook */
  table.phrase{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--sh);}
  table.phrase th{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;text-align:left;
    color:var(--ink-70);background:var(--surface);padding:12px 14px;border-bottom:1px solid var(--border);}
  .tbl-scroll{overflow-x:auto;}
  table.phrase td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14.5px;vertical-align:middle;}
  table.phrase tr:nth-child(even) td{background:var(--accent-050);}
  table.phrase tr:last-child td{border-bottom:0;}
  table.phrase .native{font-family:var(--display);font-size:17px;color:var(--ink);}
  table.phrase .rom{color:var(--ink-70);font-style:italic;}
  table.phrase audio{height:30px;}

  /* Receipt */
  table.receipt{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--sh);}
  table.receipt td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:14px;color:var(--ink-70);}
  table.receipt td:last-child{text-align:right;font-family:var(--mono);color:var(--ink);}
  table.receipt tr:last-child td{border-bottom:0;font-weight:600;color:var(--ink);}
  .rnote{color:var(--ink-40);font-size:12.5px;margin-top:10px;}

  footer{border-top:1px solid var(--border);margin-top:36px;}
  footer .wrap{padding:26px 20px 44px;display:flex;flex-direction:column;gap:12px;align-items:flex-start;}
  footer .tag{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--ink-40);}

  @media print{
    nav.tabs,.map,.maprow{display:none!important;}
    section.panel{display:block!important;padding:18px 0 0;}
    .card{page-break-inside:avoid;}
    header.hero,.spot .num,.pin-badge,.wcard .pop,nav.tabs button.active{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    header.hero{background:var(--ink)!important;}
    .btn{border:1px solid #999;color:#000!important;background:#fff!important;}
    a[href^="http"]:after{content:" (" attr(href) ")";font-size:9.5px;color:#666;word-break:break-all;}
  }
</style>
</head>
<body>
  <!-- Inline line-icon sprite (Lucide-style). Add symbols here; reference with icon('name'). No emoji anywhere. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></symbol>
    <symbol id="i-cloud" viewBox="0 0 24 24"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.6 1.6A3.5 3.5 0 0 0 6.5 19z"/></symbol>

  <header class="hero">
    <div class="native-wm" id="native" aria-hidden="true"></div>
    <div class="wrap">
      <div class="title" id="title"></div>
      <div class="hmeta" id="meta"></div>
      <div class="chips" id="chips"></div>
    </div>
  </header>

  <div class="wrap" id="heromapWrap"></div>
  <nav class="tabs"><div class="wrap" id="tabbar"></div></nav>
  <main class="wrap" id="main"></main>
  <footer><div class="wrap" id="footer"></div></footer>

<script>
/* ============================================================================
   ⚠️ EXAMPLE DATA ONLY — this placeholder is trimmed for readability (2 days, a few
   phrases). A REAL run MUST fill the COMPLETE plan: EVERY day of the trip, ALL ~8–12
   phrasebook rows, every recommended spot, and every prep item you actually did/bought.
   NEVER ship these placeholder counts. You ONLY edit this TRIP object + nativeName;
   do NOT touch the CSS/structure (fixed system — see reference/DESIGN.md). Empty sections auto-hide.
   ========================================================================== */
const TRIP = {
  nativeName: "東京",                                                  // native-script name → shown as the header watermark
  title: "Tokyo — 7-Day Solo Adventure",
  meta: "Sep 14–21, 2026  ·  Solo  ·  from San Francisco",
  heroImageUrl: "https://f.stableupload.dev/REPLACE/tokyo-map.png",  // generated illustrated map (hosted). Omit to hide.
  pdfUrl: "https://f.stableupload.dev/REPLACE/tokyo-itinerary.pdf",   // fill after rendering the PDF. Omit to hide.

  chips: [ {icon:"plane", text:"Nonstop JAL from SFO"}, {icon:"pin", text:"Base: Shinjuku"},
           {icon:"wallet", text:"¥162 / $1"} ],

  flight: { headline:"Book September — $284 nonstop (ZIPAIR)",
            detail:"60-day price history shows Sep is the floor ($280–490 typical); Oct/Nov sit flat ~$460–484." },

  weather: { // condition -> icon: sun | cloud | rain | snow | wind (defaults to cloud)
    days:[ {d:"Mon", cond:"cloud", t:"30°", c:"Partly cloudy"}, {d:"Tue", cond:"sun", t:"31°", c:"Clear"},
           {d:"Wed", cond:"rain", t:"27°", c:"Showers", pop:"60%"}, {d:"Thu", cond:"cloud", t:"29°", c:"Cloudy"},
           {d:"Fri", cond:"sun", t:"32°", c:"Hot & clear"} ] },

  // Quick at-a-glance references ONLY (not purchases). Keep to ~3–4.
  facts:[ {icon:"wallet", k:"Currency", v:"¥ JPY · ~150/USD"}, {icon:"plug", k:"Plug", v:"Type A · 100V"},
          {icon:"clock", k:"Time zone", v:"JST · +16h vs SF"}, {icon:"phone", k:"Emergency", v:"110 police · 119 fire/amb"} ],

  // "Before you go" — gear you bought/should grab, eSIM, prepaid card, phrasebook pointer.
  // status = a short accent chip (e.g. "Bought", "Ordered", "To buy"). link = optional (buy link, activation, "#phrasebook").
  prep:[
    {icon:"phone",  label:"Japan eSIM — 8-day, 5GB", detail:"Bitrefill · activate the QR when you land.", status:"Bought", link:"https://f.stableupload.dev/REPLACE/esim.png", linkText:"eSIM QR"},
    {icon:"plug",   label:"Power adaptor", detail:"Japan is Type A, same as the US — no adaptor needed. A 2-port USB-C charger is handy.", status:"Not needed"},
    {icon:"wallet", label:"Travel-money", detail:"Cash-heavy country; withdraw ¥ at 7-Eleven ATMs. Cards OK in cities."},
    {icon:"audio",  label:"Spoken phrasebook", detail:"10 key phrases with native audio — tap play on the Phrasebook tab.", link:"#phrasebook", linkText:"Open phrasebook"},
  ],

  days:[
    { n:1, title:"Asakusa — old Tokyo", spots:[
        {name:"Sensō-ji Temple", when:"Morning", icon:"pin", rating:"4.6", cat:"Landmark", address:"2-3-1 Asakusa, Taitō, Tokyo", blurb:"Tokyo's oldest temple; go early to beat the crowds.", lat:35.7148, lng:139.7967},
        {name:"Nakamise-dōri", when:"Midday", icon:"utensils", rating:"4.4", cat:"Street food", address:"1 Asakusa, Taitō, Tokyo", blurb:"Souvenir & snack lane up to the temple.", lat:35.7118, lng:139.7966},
        {name:"Hoppy Street", when:"Evening", icon:"utensils", rating:"4.3", cat:"Izakaya alley", address:"2 Asakusa, Taitō, Tokyo", blurb:"Retro drinking street — cheap beer & motsu.", lat:35.7112, lng:139.7935},
    ]},
    { n:2, title:"Shinjuku & ramen", spots:[
        {name:"Fuunji", when:"Lunch", icon:"utensils", rating:"4.5", cat:"Ramen (tsukemen)", address:"2-14-3 Yoyogi, Shibuya, Tokyo", blurb:"Arrive before 11am; famous dipping ramen.", lat:35.6899, lng:139.6917},
        {name:"Shinjuku Gyoen", when:"Afternoon", icon:"pin", rating:"4.6", cat:"Garden", address:"11 Naitōmachi, Shinjuku, Tokyo", blurb:"Calm garden escape (¥500).", lat:35.6852, lng:139.7100},
        {name:"Golden Gai", when:"Night", icon:"ticket", rating:"4.4", cat:"Tiny bars", address:"1-1-6 Kabukichō, Shinjuku, Tokyo", blurb:"200+ closet-sized bars; some cover charges.", lat:35.6939, lng:139.7047},
    ]},
  ],

  // Aim for ~8–12 real rows in a live run (this list is trimmed as an example).
  phrasebook:[
    {en:"Excuse me / sorry", native:"すみません", romaji:"sumimasen", use:"get attention / apologize", audio:"https://f.stableupload.dev/REPLACE/p1.mp3"},
    {en:"Thank you", native:"ありがとう", romaji:"arigatō", use:"anywhere", audio:"https://f.stableupload.dev/REPLACE/p2.mp3"},
    {en:"Please", native:"お願いします", romaji:"onegai shimasu", use:"requests", audio:"https://f.stableupload.dev/REPLACE/p4.mp3"},
    {en:"How much is it?", native:"いくらですか", romaji:"ikura desu ka", use:"shops", audio:"https://f.stableupload.dev/REPLACE/p5.mp3"},
    {en:"Where is …?", native:"…はどこですか", romaji:"… wa doko desu ka", use:"directions", audio:"https://f.stableupload.dev/REPLACE/p6.mp3"},
    {en:"Check, please", native:"お会計お願いします", romaji:"o-kaikei onegai shimasu", use:"restaurants", audio:"https://f.stableupload.dev/REPLACE/p3.mp3"},
  ],

  receipt:{ lines:[ {svc:"Google Flights (3 windows)", cost:"$0.06"}, {svc:"JMA weather", cost:"$0.005"},
                    {svc:"Maps + Tripadvisor + Apify social", cost:"$0.15"}, {svc:"Illustrated map (GPT Image)", cost:"$0.01"},
                    {svc:"Phrasebook TTS + hosting", cost:"$0.06"}, {svc:"PDF + HTML hosting", cost:"$0.02"} ],
            total:"~$0.31", note:"" },   // leave note empty — the Apify hold/refund is explained by the agent in chat, NOT in the artifact
};

/* ---- safe builders (no innerHTML) ---- */
const NS="http://www.w3.org/2000/svg", XL="http://www.w3.org/1999/xlink";
function el(tag, attrs, ...kids){
  const n=document.createElement(tag);
  if(attrs) for(const k in attrs){ const v=attrs[k]; if(v==null||v===false) continue;
    if(k==="class") n.className=v; else if(k==="style") n.style.cssText=v;
    else if(k.slice(0,2)==="on"&&typeof v==="function") n[k]=v; else n.setAttribute(k,v); }
  for(const kid of kids.flat()){ if(kid==null||kid===false) continue;
    n.appendChild(typeof kid==="object"?kid:document.createTextNode(String(kid))); }
  return n;
}
function icon(name, cls){
  const s=document.createElementNS(NS,"svg"); s.setAttribute("class","ic"+(cls?" "+cls:"")); s.setAttribute("viewBox","0 0 24 24"); s.setAttribute("aria-hidden","true");
  const u=document.createElementNS(NS,"use"); u.setAttributeNS(XL,"href","#i-"+name); u.setAttribute("href","#i-"+name);
  s.appendChild(u); return s;
}
const WEATHER_ICON={sun:"sun",clear:"sun",cloud:"cloud",clouds:"cloud",rain:"cloud-rain",showers:"cloud-rain",snow:"snow",wind:"wind"};
const pt=(s)=> s.lat!=null ? `${s.lat},${s.lng}` : encodeURIComponent(s.name||"");
const dirUrl=(s)=>`https://www.google.com/maps/dir/?api=1&destination=${pt(s)}`;
const routeUrl=(spots)=>{const p=spots.map(pt);const dest=p[p.length-1];const way=p.slice(0,-1).join('|');
  return `https://www.google.com/maps/dir/?api=1&destination=${dest}${way?`&waypoints=${way}`:''}`;};

document.getElementById("native").textContent=TRIP.nativeName||"";
document.getElementById("title").textContent=TRIP.title||"";
document.getElementById("meta").textContent=TRIP.meta||"";
const chips=document.getElementById("chips");
(TRIP.chips||[]).forEach(c=> chips.appendChild(el("span",{class:"chip"}, c.icon&&icon(c.icon), c.text)));

if(TRIP.heroImageUrl && !/REPLACE/.test(TRIP.heroImageUrl)){
  const fig=el("div",{class:"heromap"});
  fig.appendChild(el("img",{src:TRIP.heroImageUrl, alt:(TRIP.title||"")+" map", loading:"lazy", onerror:function(){fig.remove();}}));
  document.getElementById("heromapWrap").appendChild(fig);
}

const tabbar=document.getElementById("tabbar"), main=document.getElementById("main"), panels=[], MAPS={};
function addTab(id,label){ tabbar.appendChild(el("button",{"data-t":id, onclick:()=>show(id)}, label)); }
function show(id){ panels.forEach(p=>p.classList.toggle("active",p.id===id));
  [...tabbar.children].forEach(b=>{const on=b.dataset.t===id; b.classList.toggle("active",on); on?b.setAttribute("aria-current","true"):b.removeAttribute("aria-current");});
  const act=tabbar.querySelector("button.active"); if(act) act.scrollIntoView({inline:"center",block:"nearest"});
  if(MAPS[id]) setTimeout(()=>MAPS[id].invalidateSize(),60); }
function eyebrow(name,text){ return el("div",{class:"eyebrow"}, icon(name), el("span",{class:"label"}, text)); }

/* ADD YOUR OWN SECTIONS (this template is a starting point, not a fixed form).
   For anything you researched with no slot here — Neighborhoods, Food & drink, Day-trips, Etiquette, Budget —
   append a section built from the SAME blocks (no new colors/gradients/emoji/fonts):
     ov.appendChild(eyebrow("map","NEIGHBORHOODS"));
     const strip = el("div",{class:"strip"});  strip.appendChild(el("div",{class:"col"}, ... ));  ov.appendChild(strip);   // divided columns
     const list  = el("div",{class:"preplist"}); list.appendChild(el("div",{class:"item"}, icon("utensils"), el("div",null, el("div",{class:"pl"},"…"), el("div",{class:"pd"},"…")))); ov.appendChild(list);   // divided rows
   Or add a whole new tab: addTab("food","Food"); const p=el("section",{class:"panel",id:"food"}, eyebrow("utensils","Food & drink"), …); main.appendChild(p); panels.push(p);
   Keep the format varied — don't make every section a card. Remove sections you have no data for. */

/* Overview */
addTab("overview","Overview");
const ov=el("section",{class:"panel",id:"overview"});
if(TRIP.flight){ ov.appendChild(el("div",{class:"card verdict"},
  eyebrow("plane","Flight verdict"), el("h3",null,TRIP.flight.headline), el("p",null,TRIP.flight.detail))); }
if(TRIP.weather&&TRIP.weather.days){ ov.appendChild(eyebrow("thermo","Weather for your dates"));
  const w=el("div",{class:"strip"});
  TRIP.weather.days.forEach(d=> w.appendChild(el("div",{class:"col wx"},
    el("div",{class:"d"},d.d), icon(WEATHER_ICON[(d.cond||"cloud")]||"cloud"), el("div",{class:"t"},d.t),
    el("div",{class:"c"},d.c||""), d.pop&&/rain|shower|snow/i.test(d.cond||"")&&el("span",{class:"pop"}, (/snow/i.test(d.cond||"")?"snow ":"rain ")+d.pop))));
  ov.appendChild(w); }
if(TRIP.facts&&TRIP.facts.length){ ov.appendChild(eyebrow("clock","Good to know"));
  const f=el("div",{class:"strip"});
  TRIP.facts.forEach(x=> f.appendChild(el("div",{class:"col factcol"},
    el("div",{class:"k"}, icon(x.icon||"pin"), el("span",null,x.k)), el("div",{class:"v"},x.v)))); ov.appendChild(f); }
if(TRIP.prep&&TRIP.prep.length){ ov.appendChild(eyebrow("wallet","Before you go"));
  const g=el("div",{class:"preplist"});
  TRIP.prep.forEach(x=> g.appendChild(el("div",{class:"item"}, icon(x.icon||"pin"),
    el("div",null,
      el("div",null, el("span",{class:"pl"},x.label), x.status&&el("span",{class:"badge"},x.status)),
      x.detail&&el("div",{class:"pd"},x.detail),
      x.link&&(x.link[0]==="#"
        ? el("a",{class:"pa",href:x.link, onclick:(e)=>{e.preventDefault(); show(x.link.slice(1));}}, x.linkText||"Open", icon("arrow-ur"))
        : el("a",{class:"pa",href:x.link,target:"_blank",rel:"noopener"}, x.linkText||"Open", icon("arrow-ur")))))));
  ov.appendChild(g); }
main.appendChild(ov); panels.push(ov);

/* Days */
(TRIP.days||[]).forEach(day=>{ const id=`day${day.n}`; addTab(id,`Day ${day.n}`);
  const p=el("section",{class:"panel",id});
  p.appendChild(eyebrow("map",`Day ${day.n}`));
  p.appendChild(el("h2",{class:"sec"},day.title));
  const spots=day.spots||[];
  const hasPts=spots.some(s=>s.lat!=null);
  if(hasPts){
    p.appendChild(el("div",{class:"maprow"}, el("a",{class:"btn ghost",target:"_blank",rel:"noopener",href:routeUrl(spots)}, icon("route"), "Open the day's route")));
    p.appendChild(el("div",{class:"map",id:`map-${id}`}));
  }
  spots.forEach((s,i)=> p.appendChild(el("div",{class:"card spot"},
    el("div",{class:"num"}, i+1),
    el("div",{class:"body"},
      s.when&&el("div",{class:"when"},s.when),
      el("h3",null,s.name),
      (s.rating||s.cat)&&el("div",{class:"meta"}, s.rating&&icon("star","star"), s.rating&&el("span",null,s.rating), s.rating&&s.cat&&el("span",null,"·"), s.cat&&el("span",null,s.cat)),
      s.address&&el("div",{class:"addr"}, icon("pin"), el("span",null,s.address)),
      s.blurb&&el("p",null,s.blurb),
      el("a",{class:"btn ghost",target:"_blank",rel:"noopener",href:dirUrl(s)}, icon("arrow-ur"), "Directions")))));
  main.appendChild(p); panels.push(p);
  if(hasPts && typeof L!=="undefined"){ try{
    const map=L.map(`map-${id}`,{scrollWheelZoom:false}); L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",{maxZoom:20,subdomains:"abcd",attribution:"© OpenStreetMap © CARTO"}).addTo(map);
    const pts=[];
    spots.forEach((s,i)=>{ if(s.lat==null) return;
      const wrap=el("div"); wrap.appendChild(el("div",{class:"pin-badge"}, i+1));
      L.marker([s.lat,s.lng],{icon:L.divIcon({className:"",html:wrap.innerHTML,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(map).bindPopup(el("div",null,el("b",null,`${i+1}. ${s.name}`),el("br"),s.address||s.cat||""));
      pts.push([s.lat,s.lng]); });
    if(pts.length) map.fitBounds(pts,{padding:[40,40],maxZoom:15});
    MAPS[id]=map;
  }catch(e){ const m=document.getElementById(`map-${id}`); if(m) m.style.display="none"; } }
});

/* Phrasebook */
if(TRIP.phrasebook&&TRIP.phrasebook.length){ addTab("phrasebook","Phrasebook");
  const p=el("section",{class:"panel",id:"phrasebook"}, eyebrow("audio","Phrasebook"),
    el("h2",{class:"sec"},"Essential phrases"),
    el("p",{style:"color:var(--ink-70);margin:-8px 0 16px;font-size:15px"},"Tap play to hear the pronunciation."));
  const table=el("table",{class:"phrase"}, el("tr",null,...["English","Local","Romaji","When","Listen"].map(h=>el("th",null,h))));
  TRIP.phrasebook.forEach(x=> table.appendChild(el("tr",null,
    el("td",null,x.en), el("td",null,el("span",{class:"native"},x.native)), el("td",null,el("span",{class:"rom"},x.romaji)),
    el("td",null,x.use||""), el("td",null, x.audio?el("audio",{controls:"",preload:"none",src:x.audio}):""))));
  p.appendChild(el("div",{class:"tbl-scroll"}, table)); main.appendChild(p); panels.push(p);
}

/* Receipt */
if(TRIP.receipt){ addTab("receipt","Cost");
  const r=TRIP.receipt; const table=el("table",{class:"receipt"});
  r.lines.forEach(l=> table.appendChild(el("tr",null, el("td",null,l.svc), el("td",null,l.cost))));
  table.appendChild(el("tr",null, el("td",null,"Total"), el("td",null,r.total)));
  main.appendChild(el("section",{class:"panel",id:"receipt"}, eyebrow("receipt","What this cost"), table,
    r.note&&el("p",{class:"rnote"},r.note))); panels.push(main.lastChild);
}

/* Footer */
const footer=document.getElementById("footer");
if(TRIP.pdfUrl && !/REPLACE/.test(TRIP.pdfUrl)) footer.appendChild(el("a",{class:"btn primary",href:TRIP.pdfUrl,target:"_blank",rel:"noopener"}, icon("receipt"), "Download the PDF itinerary"));
footer.appendChild(el("span",{class:"tag"},"Built by trip-planner · grounded in live data, paid per call over x402"));
show("overview");
</script>
</body>
</html>
